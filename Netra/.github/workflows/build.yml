name: Build & Test Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    strategy:
      matrix:
        build-type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.20.x'

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Configure
        run: |
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} `
            -DNETRA_ENABLE_TESTS=ON `
            -DNETRA_ENABLE_LOGGING=ON `
            -DNETRA_ENABLE_PROFILING=ON `
            -S . -B build

      - name: Build
        run: cmake --build build --config ${{ matrix.build-type }}

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure -C ${{ matrix.build-type }}

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: netra-windows-${{ matrix.build-type }}
          path: build/bin/

  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build-type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev ninja-build

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.20.x'

      - name: Configure
        run: |
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DNETRA_ENABLE_TESTS=ON \
            -DNETRA_ENABLE_LOGGING=ON \
            -DNETRA_ENABLE_PROFILING=ON \
            -S . -B build

      - name: Build
        run: cmake --build build --config ${{ matrix.build-type }}

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure -C ${{ matrix.build-type }}

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: netra-linux-${{ matrix.build-type }}
          path: build/bin/

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    strategy:
      matrix:
        build-type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          brew install libpcap ninja

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.20.x'

      - name: Configure
        run: |
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DNETRA_ENABLE_TESTS=ON \
            -DNETRA_ENABLE_LOGGING=ON \
            -DNETRA_ENABLE_PROFILING=ON \
            -S . -B build

      - name: Build
        run: cmake --build build --config ${{ matrix.build-type }}

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure -C ${{ matrix.build-type }}

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: netra-macos-${{ matrix.build-type }}
          path: build/bin/

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy

      - name: Check Code Formatting
        run: |
          find include src tests -name '*.hpp' -o -name '*.cpp' | xargs clang-format --dry-run --Werror

      - name: Check for TODO comments
        run: |
          if grep -r "TODO\|FIXME\|HACK" include src --include="*.hpp" --include="*.cpp" | grep -v "test_"; then
            echo "Found TODO/FIXME/HACK comments in code"
          fi
